name: Update Learning Stats

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
  schedule:
    # 매일 KST 자정 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 커밋 히스토리 필요

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run stats update
        run: python scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name 'Hanzi-Cho'
          git config user.email 'whwogus1983@gmail.com'
          git add -A
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          STAGED_FILES=$(git diff --staged --name-only)
          
          if [ "$STAGED_FILES" = "README.md" ]; then
            COMMIT_MSG="chore: update learning stats [skip ci]"
          else
            DAILY_FILES=""
            KNOWLEDGE_DOMAINS=""
            OTHER_FILES=""
            
            for file in $STAGED_FILES; do
              if [[ "$file" =~ daily/([0-9]{4}-[0-9]{2}-[0-9]{2})\.md ]]; then
                date="${BASH_REMATCH[1]}"
                DAILY_FILES="$DAILY_FILES $date"
              elif [[ "$file" =~ knowledge/([^/]+)/ ]]; then
                domain="${BASH_REMATCH[1]}"
                if [[ ! "$KNOWLEDGE_DOMAINS" =~ "$domain" ]]; then
                  KNOWLEDGE_DOMAINS="$KNOWLEDGE_DOMAINS $domain"
                fi
              elif [ "$file" != "README.md" ]; then
                OTHER_FILES="$OTHER_FILES $(basename "$file")"
              fi
            done
            
            MSG_PARTS=()
            if [ -n "$DAILY_FILES" ]; then
              dates=$(echo "$DAILY_FILES" | xargs)
              MSG_PARTS+=("daily $dates 정리")
            fi
            if [ -n "$KNOWLEDGE_DOMAINS" ]; then
              domains=$(echo "$KNOWLEDGE_DOMAINS" | xargs | sed 's/ /, /g')
              MSG_PARTS+=("knowledge ($domains) 내용 추가")
            fi
            if [ -n "$OTHER_FILES" ]; then
              others=$(echo "$OTHER_FILES" | xargs | sed 's/ /, /g')
              MSG_PARTS+=("update $others")
            fi
            
            COMMIT_MSG=""
            for part in "${MSG_PARTS[@]}"; do
              if [ -z "$COMMIT_MSG" ]; then
                COMMIT_MSG="$part"
              else
                COMMIT_MSG="$COMMIT_MSG, $part"
              fi
            done
            COMMIT_MSG="docs: $COMMIT_MSG [skip ci]"
          fi
          
          git commit -m "$COMMIT_MSG"
          git push
